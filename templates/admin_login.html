<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login | ParkWise</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --card: #161922;
    --accent: #f5c518;
    --accent2: #ff6b35;
    --text: #e8eaf0;
    --muted: #6b7280;
    --border: #252833;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 70vw; height: 70vw;
    background: radial-gradient(circle, rgba(245,197,24,0.07) 0%, transparent 65%);
    pointer-events: none;
  }
  body::after {
    content: 'P';
    position: fixed;
    bottom: -5%;
    right: -5%;
    font-family: 'Syne', sans-serif;
    font-size: 40vw;
    font-weight: 800;
    color: rgba(255,255,255,0.015);
    pointer-events: none;
    line-height: 1;
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
    animation: slideUp 0.5s cubic-bezier(.23,1,.32,1) both;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(30px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: #0d0f14;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
  }
  .logo-text span { color: var(--accent); }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .field {
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }

  .error {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--accent2);
    margin-bottom: 18px;
  }

  button[type=submit] {
    width: 100%;
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button[type=submit]:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(245,197,24,0.25);
  }
  button[type=submit]:active { transform: translateY(0); }

  .hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 20px;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">P</div>
    <div class="logo-text">Park<span>Wise</span></div>
  </div>
  <h1>Admin Portal</h1>
  <p class="subtitle">Sign in to manage your parking system</p>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required autofocus/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required/>
    </div>
    <button type="submit">Sign In →</button>
  </form>
  <p class="hint">Default: admin / admin123 — change after first login</p>
</div>
</body>
</html>
