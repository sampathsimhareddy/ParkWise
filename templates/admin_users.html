<!-- ===================== admin_users.html ===================== -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Users | ParkWise Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#0d0f14; --sidebar:#10131a; --card:#161922; --accent:#f5c518; --accent2:#ff6b35; --green:#22c55e; --text:#e8eaf0; --muted:#6b7280; --border:#252833; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; display:flex; min-height:100vh; }
  .sidebar { width:240px; background:var(--sidebar); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:28px 0; position:fixed; height:100vh; z-index:10; }
  .logo { display:flex; align-items:center; gap:10px; padding:0 24px 28px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .logo-icon { width:36px; height:36px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#0d0f14; }
  .logo-text { font-family:'Syne',sans-serif; font-weight:700; font-size:17px; }
  .logo-text span { color:var(--accent); }
  nav a { display:flex; align-items:center; gap:12px; padding:11px 24px; text-decoration:none; color:var(--muted); font-size:14px; font-weight:500; border-left:3px solid transparent; transition:all 0.2s; }
  nav a:hover { color:var(--text); background:rgba(255,255,255,0.04); }
  nav a.active { color:var(--accent); border-left-color:var(--accent); background:rgba(245,197,24,0.06); }
  nav a .icon { font-size:16px; width:20px; text-align:center; }
  .sidebar-footer { margin-top:auto; padding:20px 24px 0; border-top:1px solid var(--border); }
  .logout-btn { display:block; text-align:center; background:rgba(255,107,53,0.1); color:var(--accent2); border:1px solid rgba(255,107,53,0.2); border-radius:8px; padding:9px; text-decoration:none; font-size:13px; font-weight:500; }
  .main { margin-left:240px; padding:36px; flex:1; }
  .page-header { margin-bottom:24px; }
  .page-header h1 { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; }
  .page-header p { color:var(--muted); font-size:14px; margin-top:4px; }
  .search-bar { display:flex; gap:10px; margin-bottom:20px; }
  .search-bar input { flex:1; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; }
  .search-bar input:focus { border-color:var(--accent); }
  .search-bar button { background:var(--accent); color:#0d0f14; border:none; border-radius:10px; padding:10px 20px; font-family:'Syne',sans-serif; font-weight:700; font-size:14px; cursor:pointer; }
  .table-card { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; padding:12px 16px; font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); background:rgba(255,255,255,0.02); }
  td { padding:13px 16px; font-size:13px; border-top:1px solid var(--border); }
  tr:hover td { background:rgba(255,255,255,0.02); }
  .rank-1 { color:var(--accent); font-weight:700; }
  .empty { padding:40px; text-align:center; color:var(--muted); }
  @media (max-width:768px) { .sidebar{display:none;} .main{margin-left:0;padding:20px;} }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo"><div class="logo-icon">P</div><div class="logo-text">Park<span>Wise</span></div></div>
  <nav>
    <a href="/admin"><span class="icon">📊</span> Overview</a>
    <a href="/admin/bookings"><span class="icon">📋</span> Bookings</a>
    <a href="/admin/users" class="active"><span class="icon">👥</span> Users</a>
    <a href="/admin/slots"><span class="icon">🅿️</span> Parking Slots</a>
    <a href="/admin/analytics"><span class="icon">📈</span> Analytics</a>
  </nav>
  <div class="sidebar-footer"><a href="/admin/logout" class="logout-btn">Sign Out</a></div>
</aside>
<main class="main">
  <div class="page-header">
    <h1>Registered Users</h1>
    <p>{{ users|length }} user(s) total</p>
  </div>
  <div class="search-bar">
    <form method="GET" style="display:flex;gap:10px;width:100%;">
      <input type="text" name="search" placeholder="Search by name or mobile..." value="{{ search }}"/>
      <button type="submit">Search</button>
    </form>
  </div>
  <div class="table-card">
    <table>
      <thead><tr>
        <th>#</th><th>Name</th><th>Mobile</th><th>Bookings</th><th>Total Spent</th>
      </tr></thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td style="color:var(--muted);">{{ u[0] }}</td>
          <td {% if loop.index == 1 %}class="rank-1"{% endif %}>{{ u[1] }}</td>
          <td style="color:var(--muted);">{{ u[2] }}</td>
          <td>{{ u[3] }}</td>
          <td style="color:var(--accent);font-weight:600;">₹{{ u[4]|round(2) }}</td>
        </tr>
        {% else %}
        <tr><td colspan="5" class="empty">No users found</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
