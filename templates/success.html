<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Booking Confirmed | ParkWise</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0d0f14; --card:#161922; --accent:#f5c518;
    --green:#22c55e; --text:#e8eaf0; --muted:#6b7280; --border:#252833;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
  }

  /* Confetti particles */
  .confetti-wrap { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .confetti {
    position:absolute; width:8px; height:8px; border-radius:2px;
    animation:fall linear forwards;
  }
  @keyframes fall {
    0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
  }

  /* Glow */
  body::before {
    content:'';
    position:fixed; top:-20%; left:50%; transform:translateX(-50%);
    width:60vw; height:60vw;
    background:radial-gradient(circle, rgba(34,197,94,0.07) 0%, transparent 65%);
    pointer-events:none;
  }

  .card {
    background:var(--card); border:1px solid var(--border); border-radius:24px;
    padding:48px 40px; text-align:center;
    width:100%; max-width:440px; position:relative; z-index:1;
    animation:popIn 0.6s cubic-bezier(.23,1,.32,1) both;
  }
  @keyframes popIn { from { opacity:0; transform:scale(0.85) translateY(20px); } to { opacity:1; transform:none; } }

  /* Success icon */
  .success-icon {
    width:80px; height:80px; border-radius:50%;
    background:rgba(34,197,94,0.15); border:2px solid var(--green);
    margin:0 auto 24px;
    display:flex; align-items:center; justify-content:center;
    font-size:36px;
    animation:bounce 0.6s 0.3s cubic-bezier(.23,1,.32,1) both;
  }
  @keyframes bounce { from { transform:scale(0); } 70% { transform:scale(1.15); } to { transform:scale(1); } }

  h1 { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; margin-bottom:6px; }
  .sub { color:var(--muted); font-size:14px; margin-bottom:32px; }

  /* Booking code */
  .booking-code-box {
    background:var(--bg); border:1px solid rgba(245,197,24,0.25); border-radius:14px;
    padding:20px; margin-bottom:24px;
    cursor:pointer; transition:border-color 0.2s;
    position:relative;
  }
  .booking-code-box:hover { border-color:var(--accent); }
  .code-label { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:8px; }
  .code-value {
    font-family:'Syne',sans-serif; font-size:28px; font-weight:800;
    color:var(--accent); letter-spacing:0.05em;
  }
  .copy-hint { font-size:11px; color:var(--muted); margin-top:6px; }
  .copy-hint.copied { color:var(--green); }

  /* Details */
  .details { text-align:left; margin-bottom:28px; }
  .detail-row {
    display:flex; justify-content:space-between;
    padding:11px 0; border-bottom:1px solid var(--border); font-size:14px;
  }
  .detail-row:last-child { border-bottom:none; }
  .detail-label { color:var(--muted); }
  .detail-val { font-weight:500; }
  .detail-val.accent { color:var(--accent); font-weight:700; }

  .btn-dashboard {
    display:block; width:100%;
    background:var(--accent); color:#0d0f14;
    border:none; border-radius:12px; padding:15px;
    font-family:'Syne',sans-serif; font-size:15px; font-weight:700;
    text-decoration:none; margin-bottom:12px;
    transition:transform 0.15s, box-shadow 0.15s;
  }
  .btn-dashboard:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(245,197,24,0.3); }

  .btn-new {
    display:block; width:100%;
    background:transparent; color:var(--muted);
    border:1px solid var(--border); border-radius:12px; padding:14px;
    font-family:'Syne',sans-serif; font-size:14px; font-weight:600;
    text-decoration:none; transition:border-color 0.2s, color 0.2s;
  }
  .btn-new:hover { border-color:var(--accent); color:var(--accent); }

  @media (max-width:500px) {
    .card { padding:32px 22px; margin:16px; }
    .code-value { font-size:22px; }
  }
</style>
</head>
<body>

<!-- Confetti -->
<div class="confetti-wrap" id="confettiWrap"></div>

<div class="card">
  <div class="success-icon">✓</div>
  <h1>Booking Confirmed!</h1>
  <p class="sub">Your parking slot has been reserved successfully.</p>

  <div class="booking-code-box" onclick="copyCode()">
    <div class="code-label">Booking Code</div>
    <div class="code-value">{{ booking_code }}</div>
    <div class="copy-hint" id="copyHint">Tap to copy</div>
  </div>

  <div class="details">
    <div class="detail-row">
      <span class="detail-label">📍 Location</span>
      <span class="detail-val">{{ location }}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">💰 Amount Paid</span>
      <span class="detail-val accent">₹{{ total }}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">✅ Status</span>
      <span class="detail-val" style="color:var(--green);">Confirmed</span>
    </div>
  </div>

  <a href="/dashboard" class="btn-dashboard">View My Bookings →</a>
  <a href="/vehicle" class="btn-new">Book Another Slot</a>
</div>

<script>
  // Confetti
  const colors = ['#f5c518','#ff6b35','#22c55e','#60a5fa','#a78bfa','#f472b6'];
  const wrap = document.getElementById('confettiWrap');
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      animation-duration:${2+Math.random()*3}s;
      animation-delay:${Math.random()*2}s;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    wrap.appendChild(el);
  }

  // Copy code
  function copyCode() {
    navigator.clipboard.writeText('{{ booking_code }}').then(() => {
      const hint = document.getElementById('copyHint');
      hint.textContent = '✓ Copied!';
      hint.classList.add('copied');
      setTimeout(() => { hint.textContent = 'Tap to copy'; hint.classList.remove('copied'); }, 2000);
    });
  }
</script>
</body>
</html>
